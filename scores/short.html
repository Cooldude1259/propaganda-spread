<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Great War — Scores</title>
  <style>
    body { font-family: sans-serif; background: #0a0a0a; color: #ddd; max-width: 700px; margin: 0 auto; padding: 20px; }
    h1 { color: #c9a84c; text-align: center; }
    h2 { color: #c9a84c; font-size: 14px; margin-top: 24px; border-bottom: 1px solid #333; padding-bottom: 6px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 14px; }
    th { text-align: left; color: #888; font-weight: normal; padding: 4px 8px; }
    td { padding: 6px 8px; border-bottom: 1px solid #1a1a1a; }
    .rat { color: #a0522d; }
    .cat { color: #9b59b6; }
    .total { font-weight: bold; color: #fff; }
    .note { color: #666; font-size: 12px; text-align: center; margin-top: 30px; }
    .master { background: #111; border: 1px solid #333; padding: 16px; border-radius: 4px; margin-bottom: 24px; text-align: center; }
    .master .pts { font-size: 28px; font-weight: bold; }
    .master-row { display: flex; justify-content: space-around; }
    .master-army { flex: 1; }
    .hidden-badge { background: #1a1a1a; color: #666; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>⚔️ The Great War — Live Scores</h1>
  <p style="text-align:center;color:#666;font-size:13px;">Public microscores only. Hidden variables revealed at the finale.</p>

  <div class="master" id="master">Loading...</div>
  <div id="events"></div>
  <p class="note">Last updated: <span id="updated">—</span> · <a href="." style="color:#c9a84c">Submit Propaganda</a></p>

  <script>
    const SB_URL = 'https://nhmmfriwthsvacfsrchd.supabase.co'
    const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5obW1mcml3dGhzdmFjZnNyY2hkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjYzMjQsImV4cCI6MjA5NDUwMjMyNH0.FIN04Hjcsm6oMMpHB-lFG4_-FBByjtWX7HtezoHL1-o'

    async function query(table, params = '') {
      const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {
        headers: { apikey: SB_ANON, Authorization: `Bearer ${SB_ANON}` }
      })
      return r.json()
    }

    async function load() {
      const [configs, scores] = await Promise.all([
        query('leaderboard_config', 'order=event_number'),
        query('scores', 'order=event_number')
      ])

      // Master totals
      const totals = { rat: 0, cat: 0 }
      scores.forEach(s => { totals[s.army] += s.points })

      document.getElementById('master').innerHTML = `
        <div style="color:#888;font-size:12px;margin-bottom:8px;">VISIBLE TOTAL SCORE</div>
        <div class="master-row">
          <div class="master-army">
            <div style="color:#a0522d">🐀 Rat Army</div>
            <div class="pts" style="color:#a0522d">${totals.rat}</div>
          </div>
          <div style="color:#444;font-size:24px;align-self:center">vs</div>
          <div class="master-army">
            <div style="color:#9b59b6">🐱 Cat Army</div>
            <div class="pts" style="color:#9b59b6">${totals.cat}</div>
          </div>
        </div>
        <div style="margin-top:12px"><span class="hidden-badge">+ hidden variables pending finale</span></div>
      `

      // Per event
      const eventsEl = document.getElementById('events')
      eventsEl.innerHTML = ''

      for (const cfg of configs) {
        const evScores = scores.filter(s => s.event_number === cfg.event_number)
        if (evScores.length === 0) continue

        const evTotals = { rat: 0, cat: 0 }
        evScores.forEach(s => { evTotals[s.army] += s.points })

        let rows = ''
        evScores.forEach(s => {
          rows += `<tr>
            <td class="${s.army}">${s.army === 'rat' ? '🐀' : '🐱'} ${s.metric_name}</td>
            <td>${s.note || '—'}</td>
            <td class="${s.army}">${s.points > 0 ? '+' : ''}${s.points}</td>
          </tr>`
        })

        eventsEl.innerHTML += `
          <h2>Event ${cfg.event_number} — ${cfg.event_name} <span style="color:#555;font-size:11px">[${cfg.status}]</span></h2>
          <table>
            <tr><th>Metric</th><th>Note</th><th>Pts</th></tr>
            ${rows}
            <tr>
              <td class="total" colspan="2">🐀 Rat Total</td>
              <td class="total rat">${evTotals.rat}</td>
            </tr>
            <tr>
              <td class="total" colspan="2">🐱 Cat Total</td>
              <td class="total cat">${evTotals.cat}</td>
            </tr>
          </table>
        `
      }

      document.getElementById('updated').textContent = new Date().toLocaleTimeString()
    }

    load()
    setInterval(load, 30000)
  </script>
</body>
</html>
